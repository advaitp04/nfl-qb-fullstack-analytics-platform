services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/nfl_cortisol
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: dockerfile
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "7860:7860"
    volumes:
      - .:/app
  
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: nfl_cortisol 
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: